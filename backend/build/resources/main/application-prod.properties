# --- Cloud Database Configuration (Neon/Render) ---
# We use ${VARIABLE_NAME} to let the Cloud inject the real values safely
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings
# In production, 'update' keeps your data safe while allowing schema changes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Server configuration
# Render assigns a dynamic port variable automatically. We default to 8080 if missing.
server.port=${PORT:8080}

# JWT configuration (Inject this from Cloud Environment Variables)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=3600000

# Spring Security
spring.main.allow-bean-definition-overriding=true