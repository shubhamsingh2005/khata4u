# --- PostgreSQL Configuration (Switching from H2) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/khata4u
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings
# 'update' automatically creates tables if they don't exist, but keeps data
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server configuration
server.port=8085
# BIND TO ALL INTERFACES explicitly
server.address=0.0.0.0

# JWT configuration (replace with secure values in production)
jwt.secret=replace_with_secure_random_secret_change_in_production
jwt.expiration-ms=3600000

# Example Spring Security properties (tweak as needed)
spring.main.allow-bean-definition-overriding=true
